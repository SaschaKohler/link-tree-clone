name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: blisha234/link-tree-clone:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl via Tailscale
      run: |
        # # Tailscale setup
        # curl -fsSL https://tailscale.com/install.sh | sh
        # echo "${{ secrets.TAILSCALE_AUTHKEY }}" | tailscale up --authkey=stdin --accept-routes
        
        # # Wait for connection
        # tailscale status
        
        # Use kubeconfig with Tailscale IP
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/
        kubectl rollout restart deployment/link-tree-clone
